<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#111008"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1a10"/>
      <stop offset="100%" stop-color="#111008"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#c87800"/>
    </linearGradient>
  </defs>
  <!-- 마사지 아이콘 - 손 모양 -->
  <circle cx="256" cy="220" r="80" fill="url(#gold)" opacity="0.9"/>
  <text x="256" y="250" font-size="100" text-anchor="middle" fill="#111008">💆</text>
  <!-- 하단 텍스트 -->
  <text x="256" y="370" font-size="36" font-weight="bold" text-anchor="middle" fill="#f0a500" font-family="sans-serif">MASSAGE</text>
  <text x="256" y="410" font-size="24" text-anchor="middle" fill="#7a7050" font-family="sans-serif">GUIDE</text>
  <!-- 별 장식 -->
  <circle cx="130" cy="180" r="8" fill="#f0a500" opacity="0.6"/>
  <circle cx="382" cy="160" r="6" fill="#f0a500" opacity="0.4"/>
  <circle cx="160" cy="300" r="5" fill="#f0a500" opacity="0.3"/>
</svg>
